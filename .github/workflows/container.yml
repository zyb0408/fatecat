name: FateCat Container

on:
  workflow_dispatch:
    inputs:
      push_image:
        description: "Push image to GHCR after build and smoke"
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  packages: write

jobs:
  delivery-image:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build delivery image
        run: bash scripts/container-build.sh --image fatecat-delivery:ci --progress plain

      - name: Smoke delivery image
        run: bash scripts/container-smoke.sh --image fatecat-delivery:ci --skip-build --startup-timeout 90

      - name: Login to GHCR
        if: inputs.push_image
        run: echo "${{ github.token }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Push main image
        if: inputs.push_image && github.ref == 'refs/heads/main'
        run: |
          image="ghcr.io/${{ github.repository_owner }}/fatecat-delivery"
          short_sha="$(git rev-parse --short=12 HEAD)"
          docker tag fatecat-delivery:ci "${image}:main"
          docker tag fatecat-delivery:ci "${image}:${short_sha}"
          docker push "${image}:main"
          docker push "${image}:${short_sha}"

      - name: Push release tag image
        if: inputs.push_image && startsWith(github.ref, 'refs/tags/v')
        run: |
          image="ghcr.io/${{ github.repository_owner }}/fatecat-delivery"
          version="${GITHUB_REF_NAME}"
          docker tag fatecat-delivery:ci "${image}:${version}"
          docker push "${image}:${version}"
