name: FateCat Acceptance

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  acceptance:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: project/pyproject.toml

      - name: Install system tools
        run: |
          sudo apt-get update
          sudo apt-get install -y rsync

      - name: Run acceptance gate
        env:
          RUFF_CACHE_DIR: /tmp/fatecat-ruff-cache
        run: bash scripts/acceptance.sh --with-dev --output /tmp/fatecat-ci-acceptance
